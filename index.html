<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Held Whiteboard Paint</title>
  </head>
  <body>
    <main class="app-shell">
      <h1 class="sr-only">Held Whiteboard Paint</h1>

      <section class="scene" aria-label="Drawing board">
        <img
          id="sceneImage"
          class="scene-image"
          src="/src/assets/held-whiteboard.png"
          alt=""
          draggable="false"
        />
        <div class="drag-region" data-tauri-drag-region></div>
        <canvas id="paint" aria-label="Whiteboard drawing surface"></canvas>
      </section>

      <div class="toolbar clip-panel" aria-label="Drawing controls">
        <section class="hud-equipment" aria-label="Equipment">
          <div class="hud-section-title">
            <span class="title-slash"></span>
            <span>EQUIPMENT</span>
            <span class="title-rule"></span>
          </div>

          <div class="tool-grid">
            <button class="tool-button is-active" type="button" data-tool="brush" aria-label="Brush tool">
              <span class="hud-symbol">BR</span>
              <span>BRUSH</span>
            </button>
            <button class="tool-button" type="button" data-tool="line" aria-label="Line tool">
              <span class="hud-symbol">/</span>
              <span>LINE</span>
            </button>
            <button class="tool-button" type="button" data-tool="rect" aria-label="Rectangle tool">
              <span class="hud-symbol">□</span>
              <span>RECT</span>
            </button>
            <button id="clearBtn" class="tool-button clear-tool" type="button" aria-label="Clear board">
              <span class="hud-symbol">×</span>
              <span>CLEAR</span>
            </button>
            <div class="action-stack">
              <button id="undoBtn" class="stack-button" type="button" aria-label="Undo">
                <span>↶</span>
              </button>
              <button id="redoBtn" class="stack-button" type="button" aria-label="Redo">
                <span>↷</span>
              </button>
            </div>
          </div>
        </section>

        <section class="hud-properties" aria-label="Properties and files">
          <div class="property-card clip-corner">
            <div class="corner corner-top"></div>
            <div class="corner corner-bottom"></div>

            <div class="compact-row">
              <label class="color-swatch" for="colorPicker" aria-label="Brush color">
                <input type="color" id="colorPicker" value="#111111" />
              </label>

              <div class="property-info">
                <div class="color-text">
                  <span>COLOR</span>
                  <strong id="colorValue">#111111</strong>
                </div>

                <div class="size-compact">
                  <span>SIZE</span>
                  <div class="size-value-row">
                    <output id="sizeValue">5PX</output>
                    <label class="mini-range clip-slanted" for="brushSize" aria-label="Brush size">
                      <input type="range" id="brushSize" min="1" max="30" value="5" />
                      <span class="range-fill" id="rangeFill"></span>
                    </label>
                  </div>
                </div>
              </div>

              <input type="text" id="fileName" value="drawing.png" aria-label="File name" />
            </div>

          </div>

          <div class="system-actions">
            <button id="saveBtn" class="system-button" type="button">
              <span>↓</span>
              <span>SAVE</span>
            </button>
            <button id="loadBtn" class="system-button" type="button">
              <span>↑</span>
              <span>LOAD</span>
            </button>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
